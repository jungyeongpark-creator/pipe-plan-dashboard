<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/pipe-plan-dashboard/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="조관계획">

<title>전 공장 조관계획 통합 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; color: #222; font-size: 13px; }
  header { background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  header .meta { font-size: 12px; opacity: 0.85; text-align: right; line-height: 1.6; }
  .container { max-width: 1600px; margin: 0 auto; padding: 16px; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .summary-card { padding: 14px 18px; text-align: center; border-top: 4px solid #2d6a9f; }
  .summary-card .label { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value { font-size: 26px; font-weight: 700; color: #1a3c5e; }
  .summary-card .sub { font-size: 11px; color: #888; margin-top: 2px; }
  .summary-card.pohang { border-color: #2d6a9f; }
  .summary-card.gunsan { border-color: #27ae60; }
  .summary-card.suncheon { border-color: #e67e22; }
  .summary-card.total { border-color: #8e44ad; }
  .section-title { font-size: 15px; font-weight: 700; color: #1a3c5e; padding: 0 0 8px 4px; border-bottom: 2px solid #2d6a9f; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title .badge { background: #2d6a9f; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .section-title .badge.green { background: #27ae60; }
  .section-title .badge.orange { background: #e67e22; }
  .kpi-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .kpi-table th { background: #1a3c5e; color: #fff; padding: 7px 8px; text-align: center; font-weight: 600; white-space: nowrap; }
  .kpi-table td { padding: 6px 8px; text-align: center; border-bottom: 1px solid #eee; white-space: nowrap; }
  .kpi-table tr:hover td { background: #f5f8ff; }
  .kpi-table .name { font-weight: 700; color: #1a3c5e; }
  .util-bar { display: flex; align-items: center; gap: 6px; justify-content: center; }
  .util-bar-bg { width: 70px; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; }
  .util-bar-fill { height: 100%; border-radius: 5px; }
  .good { background: #27ae60; }
  .warn { background: #f39c12; }
  .low  { background: #e74c3c; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .chart-card { padding: 14px; }
  .chart-card canvas { max-height: 220px; }
  .chart-title { font-size: 12px; font-weight: 700; color: #444; margin-bottom: 10px; text-align: center; }
  .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 16px; }
  .section-block { margin-bottom: 16px; }
  .order-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .order-card { padding: 14px; }
  .order-card .order-count { font-size: 32px; font-weight: 800; color: #1a3c5e; margin: 4px 0; }
  .order-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; border-bottom: 1px dashed #eee; }
  .order-row:last-child { border: none; }
  .order-label { color: #555; }
  .order-val { font-weight: 700; color: #333; }
  .factory-section { margin-bottom: 20px; }
  @media (max-width: 1200px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-grid { grid-template-columns: 1fr 1fr; }
    .two-col { grid-template-columns: 1fr; }
  }

  /* ===== 모바일 반응형 ===== */
  @media (max-width: 768px) {
    header { padding: 10px 14px; flex-direction: column; align-items: flex-start; gap: 6px; }
    header h1 { font-size: 15px; }
    header .meta { text-align: left; font-size: 11px; }
    .container { padding: 8px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
    .summary-card { padding: 10px 12px; }
    .summary-card .value { font-size: 20px; }
    .chart-grid { grid-template-columns: 1fr; gap: 8px; }
    .chart-card canvas { max-height: 180px; }
    .two-col { grid-template-columns: 1fr; }
    .order-grid { grid-template-columns: 1fr; gap: 8px; }
    .kpi-table { font-size: 10px; }
    .kpi-table th, .kpi-table td { padding: 4px 5px; }
    .util-bar-bg { width: 50px; }
    .section-title { font-size: 13px; }
  }
  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .summary-card .value { font-size: 18px; }
  }

</style>
</head>

<header>
  <div>
    <h1>🏭 전 공장 조관계획 통합 대시보드</h1>
    <div style="font-size:13px;opacity:.9;margin-top:4px;">세아제강 | SMART기술팀</div>
  </div>
  <div class="meta" id="headerMeta"></div>
</header>

<div class="container">

  <!-- 요약 카드 -->
  <div class="summary-grid" style="margin-top:16px;">
    <div class="summary-card card pohang" id="sumPohang"></div>
    <div class="summary-card card gunsan" id="sumGunsan"></div>
    <div class="summary-card card suncheon" id="sumSuncheon"></div>
    <div class="summary-card card total" id="sumTotal"></div>
  </div>

  <!-- 차트 행: 가동율 비교 / 포항 물종 / 군산 용도 -->
  <div class="chart-grid">
    <div class="card chart-card">
      <div class="chart-title">전 공장 설비 가동율 비교 (%)</div>

      <canvas id="chartPohangJokwan"></canvas>
    </div>
    <div class="card chart-card">
      <div class="chart-title">포항공장 용도별 오더 (상위 6)</div>

  <div class="factory-section section-block">
    <div class="section-title">🏗 포항공장 설비 KPI <span class="badge">6 LINE</span></div>

      <table class="kpi-table" id="tablePohang"></table>
    </div>
  </div>

  <!-- 군산 KPI 테이블 -->
  <div class="factory-section section-block">
    <div class="section-title">🏗 군산공장 설비 KPI <span class="badge green">4 LINE</span></div>

      <table class="kpi-table" id="tableGunsan"></table>
    </div>
  </div>

  <!-- 순천 KPI 테이블 -->
  <div class="factory-section section-block">
    <div class="section-title">🏗 순천공장 설비 KPI <span class="badge orange">2 LINE</span></div>

  <!-- 오더 현황 -->

    <div class="card order-card" id="orderPohang"></div>
    <div class="card order-card" id="orderGunsan"></div>

  </div>

  <div style="text-align:center;color:#aaa;font-size:11px;padding:12px 0;">
    생성일시: <span id="genTime"></span> | 기준일: <span id="baseDate2"></span>

<script>
// ── 유틸 함수 ──
const fmtN = (v, d=1) => (typeof v === 'number') ? v.toFixed(d) : '—';
const fmtI = v => (typeof v === 'number') ? v.toLocaleString() : '—';

function utilClass(u) {
  if (u >= 80) return 'good';
  if (u >= 65) return 'warn';
  return 'low';
}

function utilBar(u) {
  const cls = utilClass(u);
  return `<div class="util-bar">
    <div class="util-bar-bg"><div class="util-bar-fill ${cls}" style="width:${Math.min(u,100)}%"></div></div>
    <span style="min-width:38px">${u.toFixed(1)}%</span>
  </div>`;
}

// ── 헤더 메타 ──
document.getElementById('headerMeta').innerHTML =
  `계획 기간: <strong>${DATA.period}</strong><br>기준일: ${DATA.baseDate}<br>갱신: ${new Date().toLocaleDateString('ko-KR')}`;

document.getElementById('genTime').textContent = new Date().toLocaleString('ko-KR');
document.getElementById('baseDate2').textContent = DATA.baseDate;

// ── 요약 카드 ──
function makeSummaryCard(id, label, equips, orders, colorClass) {
  const totalMachH = equips.reduce((s,e)=>s+e.machineH, 0);
  const avgUtil = (equips.reduce((s,e)=>s+e.utilRate,0)/equips.length).toFixed(1);
  const totalQty = equips.reduce((s,e)=>s+e.planQty,0);
  document.getElementById(id).innerHTML = `
    <div class="label">${label}</div>
    <div class="value">${fmtI(totalQty)}<span style="font-size:14px;font-weight:400"> t</span></div>
    <div class="sub">${equips.length}Line | 총 ${totalMachH.toFixed(0)}h | 평균가동율 ${avgUtil}% | 오더 ${orders}건</div>`;
}
makeSummaryCard('sumPohang','포항공장 계획량',DATA.pohang,DATA.pohangOrders.total,'pohang');
makeSummaryCard('sumGunsan','군산공장 계획량',DATA.gunsan,DATA.gunsanOrders.total,'gunsan');
makeSummaryCard('sumSuncheon','순천공장 계획량',DATA.suncheon,DATA.suncheonOrders.total,'suncheon');

const allEquips = [...DATA.pohang,...DATA.gunsan,...DATA.suncheon];
const totalQty = allEquips.reduce((s,e)=>s+e.planQty,0);
const totalMachH = allEquips.reduce((s,e)=>s+e.machineH,0);
const totalOrders = DATA.pohangOrders.total + DATA.gunsanOrders.total + DATA.suncheonOrders.total;
const avgUtil = (allEquips.reduce((s,e)=>s+e.utilRate,0)/allEquips.length).toFixed(1);
document.getElementById('sumTotal').innerHTML = `
  <div class="label">강관 전체 합계</div>
  <div class="value">${fmtI(totalQty)}<span style="font-size:14px;font-weight:400"> t</span></div>
  <div class="sub">12Line | 총 ${totalMachH.toFixed(0)}h | 평균가동율 ${avgUtil}% | 오더 ${totalOrders}건</div>`;

// ── KPI 테이블 빌더 ──
const TABLE_HEADER = `<thead><tr>
  <th>설비</th><th>가동가능(h)</th><th>일평균(h)</th><th>가동일수</th>
  <th>목표생산<br>(t/h)</th><th>계획생산<br>(t/h)</th><th>기계시간(h)</th>
  <th>비가동(h)</th><th>가동율</th><th>RC FULL</th><th>RC SIZE</th><th>계획량(t)</th>
</tr></thead>`;

function buildTable(tableId, equips) {
  const tbl = document.getElementById(tableId);
  let html = TABLE_HEADER + '<tbody>';
  equips.forEach(e => {
    const diff = e.planProd - e.targetProd;
    const diffColor = diff >= 0 ? '#27ae60' : '#e74c3c';
    html += `<tr>
      <td class="name">${e.name}</td>
      <td>${fmtN(e.availH)}</td>
      <td>${fmtN(e.avgH)}</td>
      <td>${e.days}</td>
      <td>${fmtN(e.targetProd)}</td>
      <td style="color:${diffColor};font-weight:700">${fmtN(e.planProd)}</td>
      <td>${fmtN(e.machineH)}</td>
      <td>${fmtN(e.idleH)}</td>
      <td>${utilBar(e.utilRate)}</td>
      <td>${e.rcFull}</td>
      <td>${e.rcSize}</td>
      <td style="font-weight:700">${fmtI(e.planQty)}</td>
    </tr>`;
  });
  // 소계 행
  const tot = {
    availH: equips.reduce((s,e)=>s+e.availH,0),
    machineH: equips.reduce((s,e)=>s+e.machineH,0),
    idleH: equips.reduce((s,e)=>s+e.idleH,0),
    rcFull: equips.reduce((s,e)=>s+e.rcFull,0),
    rcSize: equips.reduce((s,e)=>s+e.rcSize,0),
    planQty: equips.reduce((s,e)=>s+e.planQty,0),
    avgUtil: equips.reduce((s,e)=>s+e.utilRate,0)/equips.length
  };
  html += `<tr style="background:#f0f4ff;font-weight:700">
    <td>소계</td><td>${fmtN(tot.availH)}</td><td>—</td><td>—</td><td>—</td><td>—</td>
    <td>${fmtN(tot.machineH)}</td><td>${fmtN(tot.idleH)}</td>
    <td>${utilBar(tot.avgUtil)}</td>
    <td>${tot.rcFull}</td><td>${tot.rcSize}</td><td>${fmtI(tot.planQty)}</td>
  </tr>`;
  html += '</tbody>';
  tbl.innerHTML = html;
}
buildTable('tablePohang', DATA.pohang);
buildTable('tableGunsan', DATA.gunsan);
buildTable('tableSuncheon', DATA.suncheon);

// ── 오더 카드 ──
function buildOrderCard(id, title, orders, usageObj, jokwanObj, colorHex) {
  const usageHtml = Object.entries(usageObj)
    .sort((a,b)=>b[1]-a[1]).slice(0,6)
    .map(([k,v]) => `<div class="order-row"><span class="order-label">${k}</span><span class="order-val">${v}건</span></div>`).join('');
  const jokwanHtml = jokwanObj ? Object.entries(jokwanObj)
    .map(([k,v])=>`<span style="background:#e8f0fe;color:#1a3c5e;padding:2px 6px;border-radius:4px;margin:2px;display:inline-block;font-size:11px;">${k} ${v}</span>`).join('') : '';
  document.getElementById(id).innerHTML = `
    <div style="color:${colorHex};font-weight:700;font-size:13px;">${title}</div>
    <div class="order-count">${orders}</div>
    <div style="font-size:11px;color:#888;margin-bottom:8px;">총 오더 건수</div>
    ${jokwanHtml ? `<div style="margin-bottom:8px;">${jokwanHtml}</div>` : ''}
    <div style="font-size:12px;font-weight:700;color:#555;margin:6px 0 4px;">용도별</div>
    ${usageHtml}`;
}
buildOrderCard('orderPohang','포항공장', DATA.pohangOrders.total, DATA.pohangUsage, DATA.pohangOrders.jokwan, '#2d6a9f');
buildOrderCard('orderGunsan','군산공장', DATA.gunsanOrders.total, DATA.gunsanUsage, null, '#27ae60');
buildOrderCard('orderSuncheon','순천공장', DATA.suncheonOrders.total, {PILE:16}, null, '#e67e22');

// ── 차트 1: 전 공장 설비 가동율 ──
new Chart(document.getElementById('chartUtil'), {
  type: 'bar',
  data: {
    labels: allEquips.map(e=>e.name),
    datasets: [{
      label: '가동율(%)',
      data: allEquips.map(e=>e.utilRate),
      backgroundColor: allEquips.map(e => e.utilRate>=80?'rgba(39,174,96,.8)': e.utilRate>=65?'rgba(243,156,18,.8)':'rgba(231,76,60,.8)'),
      borderRadius: 4
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    scales: {
      y: { min:0, max:100, ticks:{callback:v=>v+'%'} },
      x: { ticks:{font:{size:10}} }
    },
    plugins: {
      legend:{display:false},
      annotation: {},
      tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y.toFixed(1)}%`}}
    }
  }
});

// ── 차트 2: 포항 물종 파이 ──
const jk = DATA.pohangOrders.jokwan;
new Chart(document.getElementById('chartPohangJokwan'), {
  type: 'doughnut',
  data: {
    labels: Object.keys(jk),
    datasets: [{ data: Object.values(jk), backgroundColor:['#2d6a9f','#e67e22','#27ae60'], borderWidth:2 }]
  },
  options: {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{position:'bottom',labels:{font:{size:11}}},
      tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed}건 (${(ctx.parsed/DATA.pohangOrders.total*100).toFixed(1)}%)`}}
    }
  }
});

// ── 차트 3: 포항 용도 수평 바 ──
const usageTop6 = Object.entries(DATA.pohangUsage).sort((a,b)=>b[1]-a[1]).slice(0,6);
new Chart(document.getElementById('chartPohangUsage'), {
  type: 'bar',
  data: {
    labels: usageTop6.map(x=>x[0]),
