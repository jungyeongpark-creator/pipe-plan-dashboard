<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; color: #222; font-size: 13px; }
header { background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
header .meta { font-size: 12px; opacity: 0.85; text-align: right; line-height: 1.6; }
.container { max-width: 1600px; margin: 0 auto; padding: 16px; }

/* 월 탭 */
.month-tabs { display: flex; gap: 4px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.month-tab { padding: 8px 20px; border-radius: 6px 6px 0 0; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Malgun Gothic', sans-serif; background: #cdd8e5; color: #555; transition: all .2s; position: relative; }
.month-tab.active { background: #1a3c5e; color: #fff; }
.month-tab.has-data::after { content: '●'; position: absolute; top: 4px; right: 6px; font-size: 7px; color: #27ae60; }
.month-tab.active.has-data::after { color: #7fdd9f; }
.month-tab:hover:not(.active) { background: #b0c4d8; }

/* 업로드 버튼 */
.upload-btn { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.btn-upload { background: #fff; border: 2px dashed #2d6a9f; color: #2d6a9f; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; font-family: 'Malgun Gothic', sans-serif; transition: all .2s; display: flex; align-items: center; gap: 6px; }
.btn-upload:hover { background: #e8f0fa; }
.btn-upload input[type=file] { display: none; }

/* 업로드 드롭존 */
.drop-zone { border: 2px dashed #2d6a9f; border-radius: 10px; padding: 30px; text-align: center; background: #f7faff; margin-bottom: 16px; cursor: pointer; transition: all .2s; }
.drop-zone.drag-over { background: #ddeeff; border-color: #1a3c5e; }
.drop-zone.hidden { display: none; }
.drop-zone-icon { font-size: 36px; margin-bottom: 8px; }
.drop-zone-title { font-size: 15px; font-weight: 700; color: #1a3c5e; margin-bottom: 4px; }
.drop-zone-sub { font-size: 12px; color: #888; }
.drop-zone-month { font-size: 13px; font-weight: 700; color: #2d6a9f; margin-top: 8px; }

/* 파싱 진행 표시 */
.parse-status { background: #fff; border-radius: 8px; padding: 12px 18px; margin-bottom: 12px; font-size: 12px; color: #555; display: none; border-left: 4px solid #2d6a9f; }
.parse-status.show { display: block; }
.parse-status.ok { border-color: #27ae60; color: #27ae60; }
.parse-status.err { border-color: #e74c3c; color: #e74c3c; }

/* 카드/그리드 */
.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.summary-card { padding: 14px 18px; text-align: center; border-top: 4px solid #2d6a9f; }
.summary-card .label { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-card .value { font-size: 26px; font-weight: 700; color: #1a3c5e; }
.summary-card .sub { font-size: 11px; color: #888; margin-top: 2px; }
.summary-card.pohang { border-color: #2d6a9f; }
.summary-card.gunsan { border-color: #27ae60; }
.summary-card.suncheon { border-color: #e67e22; }
.summary-card.total { border-color: #8e44ad; }
.section-title { font-size: 15px; font-weight: 700; color: #1a3c5e; padding: 0 0 8px 4px; border-bottom: 2px solid #2d6a9f; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title .badge { background: #2d6a9f; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.section-title .badge.green { background: #27ae60; }
.section-title .badge.orange { background: #e67e22; }
.kpi-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.kpi-table th { background: #1a3c5e; color: #fff; padding: 7px 8px; text-align: center; font-weight: 600; white-space: nowrap; }
.kpi-table td { padding: 6px 8px; text-align: center; border-bottom: 1px solid #eee; white-space: nowrap; }
.kpi-table tr:hover td { background: #f5f8ff; }
.kpi-table .name { font-weight: 700; color: #1a3c5e; }
.util-bar { display: flex; align-items: center; gap: 6px; justify-content: center; }
.util-bar-bg { width: 70px; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; }
.util-bar-fill { height: 100%; border-radius: 5px; }
.good { background: #27ae60; }
.warn { background: #f39c12; }
.low  { background: #e74c3c; }
.chart-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-card { padding: 14px; }
.chart-card canvas { max-height: 220px; }
.chart-title { font-size: 12px; font-weight: 700; color: #444; margin-bottom: 10px; text-align: center; }
.section-block { margin-bottom: 16px; }
.order-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.order-card { padding: 14px; }
.order-card .order-count { font-size: 32px; font-weight: 800; color: #1a3c5e; margin: 4px 0; }
.order-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; border-bottom: 1px dashed #eee; }
.order-row:last-child { border: none; }
.order-label { color: #555; }
.order-val { font-weight: 700; color: #333; }
.factory-section { margin-bottom: 20px; }

/* 추세 차트 */
.trend-section { margin-bottom: 20px; }

/* 탭 콘텐츠 */
.tab-content { display: none; }
.tab-content.active { display: block; }

@media (max-width: 1200px) {
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr 1fr; }
}
/* 포항공장 주요오더 테이블 */
.main-order-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.main-order-table th { background: #2c5f8a; color: #fff; padding: 7px 8px; text-align: center; font-weight: 600; white-space: nowrap; }
.main-order-table td { padding: 6px 8px; text-align: center; border-bottom: 1px solid #eee; white-space: nowrap; }
.main-order-table tr:hover td { background: #f5f8ff; }
.main-order-table .code-col { font-weight: 700; color: #1a3c5e; text-align: left; }
.main-order-table tfoot td { background: #eef3fa; font-weight: 700; color: #1a3c5e; }
.market-cards { display: flex; gap: 12px; margin-top: 10px; }
.market-card { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 14px 18px; text-align: center; border-top: 4px solid #8e44ad; }
.market-card.erw { border-top-color: #c0392b; }
.market-card .m-label { font-size: 11px; color: #666; margin-bottom: 4px; letter-spacing: 0.5px; }
.market-card .m-value { font-size: 24px; font-weight: 700; color: #1a3c5e; }
@media (max-width: 768px) {
  header { padding: 10px 14px; flex-direction: column; align-items: flex-start; gap: 6px; }
  header h1 { font-size: 15px; }
  header .meta { text-align: left; font-size: 11px; }
  .container { padding: 8px; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .summary-card .value { font-size: 20px; }
  .chart-grid { grid-template-columns: 1fr; gap: 8px; }
  .order-grid { grid-template-columns: 1fr; gap: 8px; }
  .kpi-table { font-size: 10px; }
  .kpi-table th, .kpi-table td { padding: 4px 5px; }
  .util-bar-bg { width: 50px; }
  .section-title { font-size: 13px; }
  .month-tabs { gap: 2px; }
  .month-tab { padding: 6px 12px; font-size: 12px; }
}

<script>
// ── 유틸 ──
const fmtN = (v, d=1) => typeof v === 'number' ? v.toFixed(d) : '—';
const fmtI = v => typeof v === 'number' ? v.toLocaleString() : '—';
function utilClass(u) { return u >= 80 ? 'good' : u >= 65 ? 'warn' : 'low'; }
function utilBar(u) {
  const cls = utilClass(u);
  return `<div class="util-bar"><div class="util-bar-bg"><div class="util-bar-fill ${cls}" style="width:${Math.min(u,100)}%"></div></div><span style="min-width:38px">${u.toFixed(1)}%</span></div>`;
}

// ── 탭 생성 ──
function buildTabs() {
  const container = document.getElementById('monthTabs');
  container.innerHTML = '';
  MONTHS.slice().reverse().forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (DATA_STORE[m] ? ' has-data' : '') + (m === activeMonth ? ' active' : '');
    btn.textContent = m.replace('2026년 ', '');
    btn.onclick = () => selectMonth(m);
    container.appendChild(btn);
  });
  // 업로드 버튼
  const uploadWrap = document.createElement('label');
  uploadWrap.className = 'btn-upload upload-btn';
  uploadWrap.innerHTML = `📂 Excel 업로드<input type="file" id="fileInputHeader" accept=".xlsx,.xls">`;
  uploadWrap.querySelector('input').onchange = e => handleFile(e.target.files[0]);
  container.appendChild(uploadWrap);
}

// ── 월 선택 ──
function selectMonth(m) {
  activeMonth = m;
  buildTabs();
  const data = DATA_STORE[m];
  const dashContent = document.getElementById('dashContent');
  const dropZone = document.getElementById('dropZone');
  const dropZoneMonth = document.getElementById('dropZoneMonth');
  if (data) {
    dashContent.classList.remove('hidden');
    dropZone.classList.add('hidden');
    renderDashboard(data);
  } else {
    dashContent.classList.add('hidden');
    dropZone.classList.remove('hidden');
    dropZoneMonth.textContent = m + ' 조관계획서 Excel 파일을 업로드하세요';
  }
  updateTrendChart();
}

// ── 대시보드 렌더 ──
function renderDashboard(D) {
  document.getElementById('headerMeta').innerHTML =
    `계획 기간: <strong>${D.period}</strong><br>기준일: ${D.baseDate}<br>갱신: ${new Date().toLocaleDateString('ko-KR')}`;
  document.getElementById('genTime').textContent = new Date().toLocaleString('ko-KR');
  document.getElementById('baseDate2').textContent = D.baseDate;

  makeSummaryCard('sumPohang', '포항공장 계획량', D.pohang, D.pohangOrders.total + D.gunsanOrders.total + D.suncheonOrders.total);
  makeSummaryCard('sumGunsan', '군산공장 계획량', D.gunsan, D.gunsanOrders.total);
  makeSummaryCard('sumSuncheon', '순천공장 계획량', D.suncheon, D.suncheonOrders.total);
  const all = [...D.pohang, ...D.gunsan, ...D.suncheon];
  const totalQty = all.reduce((s,e)=>s+e.planQty,0);
  const totalMachH = all.reduce((s,e)=>s+e.machineH,0);
  const totalOrders = D.pohangOrders.total;
  const avgUtil = (all.reduce((s,e)=>s+e.utilRate,0)/all.length).toFixed(1);
  document.getElementById('sumTotal').innerHTML = `
    <div class="label">강관 전체 합계</div>
    <div class="value">${fmtI(totalQty)}<span style="font-size:14px;font-weight:400"> t</span></div>
    <div class="sub">${all.length}Line | 총 ${totalMachH.toFixed(0)}h | 평균가동율 ${avgUtil}% | 오더 ${totalOrders}건</div>`;

  buildTable('tablePohang', D.pohang);
  buildTable('tableGunsan', D.gunsan);
  buildTable('tableSuncheon', D.suncheon);
  buildPohangMainOrders(D);

  buildOrderCard('orderPohang', '포항공장', D.pohangOrders, D.pohangUsage);
  buildOrderCard('orderGunsan', '군산공장', D.gunsanOrders, D.gunsanUsage);
  buildOrderCard('orderSuncheon', '순천공장', D.suncheonOrders, null);


  renderUtilChart(D);
  renderPohangJokwanChart(D);
  renderPohangUsageChart(D);
}

function makeSummaryCard(id, label, equips, orders) {
  const totalMachH = equips.reduce((s,e)=>s+e.machineH,0);
  const avgUtil = (equips.reduce((s,e)=>s+e.utilRate,0)/equips.length).toFixed(1);
  const totalQty = equips.reduce((s,e)=>s+e.planQty,0);
  document.getElementById(id).innerHTML = `
    <div class="label">${label}</div>
    <div class="value">${fmtI(totalQty)}<span style="font-size:14px;font-weight:400"> t</span></div>
    <div class="sub">${equips.length}Line | 총 ${totalMachH.toFixed(0)}h | 평균가동율 ${avgUtil}% | 오더 ${orders}건</div>`;
}

const TABLE_HEADER = `<thead><tr>
  <th>설비</th><th>가동가능(h)</th><th>일평균(h)</th><th>가동일수</th>
  <th>목표생산(t/h)</th><th>계획생산(t/h)</th><th>기계시간(h)</th>
  <th>비가동(h)</th><th>목표 가동율</th><th>RC FULL</th><th>RC SIZE</th><th>계획량(t)</th>
</tr></thead>`;

function buildTable(tableId, equips) {
  const tbl = document.getElementById(tableId);
  let html = TABLE_HEADER + '<tbody>';
  equips.forEach(e => {
    const diff = e.planProd - e.targetProd;
    const dc = diff >= 0 ? '#27ae60' : '#e74c3c';
    html += `<tr>
      <td class="name">${e.name}</td><td>${fmtN(e.availH)}</td><td>${fmtN(e.avgH)}</td><td>${e.days}</td>
      <td>${fmtN(e.targetProd)}</td><td style="color:${dc};font-weight:700">${fmtN(e.planProd)}</td>
      <td>${fmtN(e.machineH)}</td><td>${fmtN(e.idleH)}</td><td>${utilBar(e.utilRate)}</td>
      <td>${e.rcFull}</td><td>${e.rcSize}</td><td style="font-weight:700">${fmtI(e.planQty)}</td>
    </tr>`;
  });
  const tot = {
    availH: equips.reduce((s,e)=>s+e.availH,0),
    machineH: equips.reduce((s,e)=>s+e.machineH,0),
    idleH: equips.reduce((s,e)=>s+e.idleH,0),
    rcFull: equips.reduce((s,e)=>s+e.rcFull,0),
    rcSize: equips.reduce((s,e)=>s+e.rcSize,0),
    planQty: equips.reduce((s,e)=>s+e.planQty,0),
    avgUtil: equips.reduce((s,e)=>s+e.utilRate,0)/equips.length
  };
  html += `<tr style="background:#f0f4ff;font-weight:700">
    <td>소계</td><td>${fmtN(tot.availH)}</td><td>—</td><td>—</td><td>—</td><td>—</td>
    <td>${fmtN(tot.machineH)}</td><td>${fmtN(tot.idleH)}</td><td>${utilBar(tot.avgUtil)}</td>
    <td>${tot.rcFull}</td><td>${tot.rcSize}</td><td>${fmtI(tot.planQty)}</td>
  </tr></tbody>`;
  tbl.innerHTML = html;
}

function buildOrderCard(id, label, orders, usage) {
  let html = `<div style="font-weight:700;font-size:13px;color:#555;margin-bottom:6px;">${label} 오더 현황</div>
    <div class="order-count">${orders.total}<span style="font-size:14px;font-weight:400"> 건</span></div>`;
  if (orders.jokwan) {
    html += Object.entries(orders.jokwan).map(([k,v])=>
      `<div class="order-row"><span class="order-label">${k}</span><span class="order-val">${v}건</span></div>`).join('');
  }
  if (usage) {
    const topUsage = Object.entries(usage).slice(0,5);
    html += `<div style="margin-top:8px;font-size:11px;font-weight:700;color:#888;margin-bottom:4px;">용도별 상위</div>`;
    html += topUsage.map(([k,v])=>
      `<div class="order-row"><span class="order-label">${k}</span><span class="order-val">${v}건</span></div>`).join('');
  }
  document.getElementById(id).innerHTML = html;
}

// ── 포항공장 주요오더 ──
function buildPohangMainOrders(D) {
  const section = document.getElementById('pohangMainOrderSection');
  const tbl = document.getElementById('tablePohangMainOrders');
  const marketDiv = document.getElementById('pohangMarketCards');
  const orders = D.pohangMainOrders || [];
  if (orders.length === 0) { section.style.display='none'; return; }
  section.style.display='';
  let html = '<thead><tr><th>기호</th><th>외경(&#934;)</th><th>부서</th><th>수주처</th><th>수량(PCS)</th><th>중량(MT)</th><th>비고</th></tr></thead><tbody>';
  orders.forEach(function(o) {
    html += '<tr>' +
      '<td class="code-col">' + o.code + '</td>' +
      '<td>' + o.od + '</td>' +
      '<td>' + o.dept + '</td>' +
      '<td>' + o.customer + '</td>' +
      '<td>' + (o.qty > 0 ? o.qty.toLocaleString() : '&mdash;') + '</td>' +
      '<td style="font-weight:700;">' + o.weight.toLocaleString() + '</td>' +
      '<td><span style="background:#e8f0fa;color:#1a3c5e;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">' + o.remark + '</span></td>' +
      '</tr>';
  });
  var tw = orders.reduce(function(s,o){return s+o.weight;},0);
  var tq = orders.reduce(function(s,o){return s+o.qty;},0);
  html += '</tbody><tfoot><tr><td colspan="4" style="text-align:right;">합 계</td><td>' + (tq>0?tq.toLocaleString():'&mdash;') + '</td><td>' + tw.toLocaleString() + '</td><td></td></tr></tfoot>';
  tbl.innerHTML = html;
  if (D.pohangMarket) {
    marketDiv.innerHTML =
      '<div class="market-card"><div class="m-label">&#127978; 시장품</div><div class="m-value">' + D.pohangMarket.sijangpum.toLocaleString() + '<span style="font-size:14px;font-weight:400"> t</span></div></div>' +
      '<div class="market-card erw"><div class="m-label">ERW PILE</div><div class="m-value">' + D.pohangMarket.erwPile.toLocaleString() + '<span style="font-size:14px;font-weight:400"> t</span></div></div>';
    marketDiv.style.display = 'flex';
  } else {
    marketDiv.style.display = 'none'; marketDiv.innerHTML = '';
  }
}

// ── 추세 차트 ──
function updateTrendChart() {
  const ctx = document.getElementById('chartTrend').getContext('2d');
  if (chartTrend) chartTrend.destroy();
  const labels = MONTHS.filter(m => DATA_STORE[m]);
  if (labels.length === 0) { document.getElementById('trendSection').style.display='none'; return; }
  document.getElementById('trendSection').style.display='';

  const pohangAvg = labels.map(m => {
    const D = DATA_STORE[m];
    return +(D.pohang.reduce((s,e)=>s+e.utilRate,0)/D.pohang.length).toFixed(1);
  });
  const gunsanAvg = labels.map(m => {
    const D = DATA_STORE[m];
    return +(D.gunsan.reduce((s,e)=>s+e.utilRate,0)/D.gunsan.length).toFixed(1);
  });
  const suncheonAvg = labels.map(m => {
    const D = DATA_STORE[m];
    return +(D.suncheon.reduce((s,e)=>s+e.utilRate,0)/D.suncheon.length).toFixed(1);
  });

  chartTrend = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels.map(m=>m.replace('2026년 ','')),
      datasets: [
        { label: '포항', data: pohangAvg, borderColor: '#2d6a9f', backgroundColor: 'rgba(45,106,159,.1)', tension: 0.3, pointRadius: 5 },
        { label: '군산', data: gunsanAvg, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,.1)', tension: 0.3, pointRadius: 5 },
        { label: '순천', data: suncheonAvg, borderColor: '#e67e22', backgroundColor: 'rgba(230,126,34,.1)', tension: 0.3, pointRadius: 5 }
      ]
    },
    options: {
      plugins: { legend: { position:'top' } },
      scales: { y: { min:50, max:100, grid:{color:'#eee'} }, x: { grid:{display:false} } },
      responsive: true, maintainAspectRatio: true
    }
  });
}

// ── Excel 업로드 & 파싱 ──
function handleFile(file) {
  if (!file) return;
  const status = document.getElementById('parseStatus');
  status.className = 'parse-status show';
  status.textContent = `📂 ${file.name} 파싱 중...`;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const parsed = parseXlsx(wb, file.name);
      if (parsed.error) {
        status.className = 'parse-status show err';
        status.textContent = '❌ ' + parsed.error;
        return;
      }
      // 월 추정: 파일명에서 또는 파싱된 period 사용
      const monthKey = parsed.period || guessMonth(file.name);
      if (!monthKey) {
        status.className = 'parse-status show err';
        status.textContent = '❌ 월을 특정할 수 없습니다. 파일명에 월 정보를 포함해주세요.';
        return;
      }
      DATA_STORE[monthKey] = parsed;
      status.className = 'parse-status show ok';
      status.textContent = `✅ ${monthKey} 데이터 업로드 완료 — 포항 ${parsed.pohang.length}Line, 군산 ${parsed.gunsan.length}Line, 순천 ${parsed.suncheon.length}Line`;
      activeMonth = monthKey;
      buildTabs();
      selectMonth(monthKey);
      setTimeout(() => { status.className = 'parse-status'; }, 5000);
    } catch(err) {
      status.className = 'parse-status show err';
      status.textContent = '❌ 파싱 오류: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

function guessMonth(filename) {
  const m = filename.match(/(\d+)월/);
  if (!m) return null;
  const mo = parseInt(m[1]);
  return `2026년 ${mo}월`;
}

// ── 설비가동계획 시트 파싱 ──
// 시트 구조: 행 6~11 = 포항(PM22,SM11,PM38,PM51,PM53,PM116)
//            행 13~16 = 군산(PM202,PM201,PM204,PM203)
//            행 18~19 = 순천(PM461,PM462)
// 컬럼: A=설비명, B=가동가능h, C=일평균h, D=가동일수, E=목표생산, F=계획생산,
//        G=기계시간, H=비가동, I=가동율, J=RC FULL, K=RC SIZE, L=계획량
function parseXlsx(wb, filename) {
  // 설비가동계획 시트 탐색
  const planSheetName = wb.SheetNames.find(n => n.includes('설비가동계획') || n.includes('가동계획'));
  if (!planSheetName) return { error: '설비가동계획 시트를 찾을 수 없습니다. 시트명: ' + wb.SheetNames.join(', ') };
  const planSheet = wb.Sheets[planSheetName];

  function cell(sheet, row, col) {
    const addr = XLSX.utils.encode_cell({ r: row-1, c: col-1 }); // 1-based to 0-based
    const c = sheet[addr];
    return c ? (typeof c.v === 'number' ? c.v : parseFloat(c.v) || 0) : 0;
  }
  function parseEquipRows(sheet, rows, names) {
    return rows.map((r, i) => ({
      name:      names[i],
      availH:    cell(sheet, r, 2),
      avgH:      cell(sheet, r, 3),
      days:      Math.round(cell(sheet, r, 4)),
      targetProd:cell(sheet, r, 5),
      planProd:  cell(sheet, r, 6),
      machineH:  cell(sheet, r, 7),
      idleH:     cell(sheet, r, 8),
      utilRate:  +(cell(sheet, r, 9) * (cell(sheet, r, 9) <= 1 ? 100 : 1)).toFixed(1),
      rcFull:    Math.round(cell(sheet, r, 10)),
      rcSize:    Math.round(cell(sheet, r, 11)),
      planQty:   Math.round(cell(sheet, r, 12))
    }));
  }

  const pohang   = parseEquipRows(planSheet, [6,7,8,9,10,11], ['PM22','SM11','PM38','PM51','PM53','PM116']);
  const gunsan   = parseEquipRows(planSheet, [13,14,15,16],    ['PM202','PM201','PM204','PM203']);
  const suncheon = parseEquipRows(planSheet, [18,19],          ['PM461','PM462']);

  // 포항 시트
  let pohangOrders = { total: 0, jokwan: { ERW: 0, JCOE: 0, SRM: 0 } };
  let pohangUsage = {};
  const pohSheet = wb.Sheets[wb.SheetNames.find(n => n.includes('포항'))];
  if (pohSheet) {
    const rows = XLSX.utils.sheet_to_json(pohSheet, { header: 1, defval: '' });
    rows.forEach(row => {
      const col6 = String(row[5] || '').trim();
      const col7 = String(row[6] || '').trim();
      if (col6) {
        if (!pohangUsage[col6]) pohangUsage[col6] = 0;
        pohangUsage[col6]++;
        pohangOrders.total++;
      }
      if (col7 && ['ERW','JCOE','SRM'].includes(col7)) {
        pohangOrders.jokwan[col7] = (pohangOrders.jokwan[col7] || 0) + 1;
      }
    });
  }

  // 군산 시트
  let gunsanOrders = { total: 0 };
  let gunsanUsage = {};
  const gsSheet = wb.Sheets[wb.SheetNames.find(n => n.includes('군산'))];
  if (gsSheet) {
    const rows = XLSX.utils.sheet_to_json(gsSheet, { header: 1, defval: '' });
    rows.forEach(row => {
      const col8 = String(row[7] || '').trim();
      if (col8) {
        if (!gunsanUsage[col8]) gunsanUsage[col8] = 0;
        gunsanUsage[col8]++;
        gunsanOrders.total++;
      }
    });
  }

  // 순천 시트
  let suncheonOrders = { total: 0 };
  const scSheet = wb.Sheets[wb.SheetNames.find(n => n.includes('순천'))];
  if (scSheet) {
    const rows = XLSX.utils.sheet_to_json(scSheet, { header: 1, defval: '' });
    rows.forEach(row => {
      const col6 = String(row[5] || '').trim();
      if (col6) suncheonOrders.total++;
    });
  }

  // 월/기준일 추정
  const monthMatch = filename.match(/(\d+)월/);
  const mo = monthMatch ? parseInt(monthMatch[1]) : new Date().getMonth() + 1;
  const period = `2026년 ${mo}월`;
  const baseDate = `2026-${String(mo-1||12).padStart(2,'0')}-28`;

  return { period, baseDate, pohang, gunsan, suncheon, pohangOrders, pohangUsage, gunsanOrders, gunsanUsage, suncheonOrders };
}

// ── 드롭존 이벤트 ──
document.addEventListener('DOMContentLoaded', () => {
  buildTabs();
  selectMonth(activeMonth);

  const dz = document.getElementById('dropZone');
  const fi = document.getElementById('fileInputDrop');

  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', e => handleFile(e.target.files[0]));

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  // 전역 드래그 앤 드롭
  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
      handleFile(file);
    }
  });
});
</script>
